<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X Clone — Messages</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="messages.css" />
  </head>

  <body class="bg-black text-white">
    <div class="container-fluid px-0">
      <div class="row g-0">

        <!-- LEFT RAIL -->
        <aside class="col-auto border-end border-dark left-rail">
          <div class="vh-100 position-sticky top-0 d-flex flex-column justify-content-between py-2">

            <div class="d-flex flex-column align-items-center gap-2">
              <a class="rail-icon" href="#" title="X"><i class="fa-brands fa-x-twitter"></i></a>

              <a class="rail-icon" href="home.html" title="Home"><i class="fa-solid fa-house"></i></a>
              <a class="rail-icon" href="explore.html" title="Explore"><i class="fa-solid fa-magnifying-glass"></i></a>

              <a class="rail-icon position-relative" href="#" title="Notifications">
                <i class="fa-regular fa-bell"></i>
                <span class="badge-x">1</span>
              </a>

              <a class="rail-icon active" href="messages.html" title="Messages">
                <i class="fa-regular fa-envelope"></i>
              </a>

              <a class="rail-icon" href="#" title="Premium"><i class="fa-regular fa-circle-check"></i></a>
              <a class="rail-icon" href="#" title="Bookmarks"><i class="fa-regular fa-bookmark"></i></a>
              <a class="rail-icon" href="#" title="Communities"><i class="fa-solid fa-user-group"></i></a>
              <a class="rail-icon" href="#" title="X"><i class="fa-brands fa-x-twitter"></i></a>
              <a class="rail-icon" href="profile.html" title="Profile"><i class="fa-regular fa-user"></i></a>
              <a class="rail-icon" href="#" title="More"><i class="fa-solid fa-ellipsis"></i></a>

              <button class="post-rail" title="Post">
                <i class="fa-solid fa-feather-pointed"></i>
              </button>
            </div>

            <div class="d-flex justify-content-center pb-2">
              <div class="mini-avatar" title="Account"></div>
            </div>
          </div>
        </aside>

        <!-- INBOX LIST -->
        <!-- On lg+ it’s a fixed-ish column, on small it just becomes the main view -->
        <section class="col-12 col-md-5 col-lg-4 col-xl-3 border-end border-dark">
          <div class="inbox-scroll">

            <div class="d-flex align-items-center justify-content-between px-3 pt-3 pb-2">
              <h2 class="m-0 fw-bold fs-4">Chat</h2>
              <div class="d-flex gap-2">
                <button class="icon-pill" title="Settings"><i class="fa-solid fa-gear"></i></button>
                <button class="icon-pill" title="New message"><i class="fa-regular fa-envelope"></i></button>
              </div>
            </div>

            <div class="px-3 pb-2">
              <div class="search-pill">
                <i class="fa-solid fa-magnifying-glass text-secondary"></i>
                <input class="search-input" type="text" placeholder="Search" />
              </div>
            </div>

            <div class="px-3 pb-2 d-flex gap-2">
              <button class="chip active">All</button>
              <button class="chip">Requests</button>
            </div>

            <div class="pb-3">
              <a class="chat-row active" href="#">
                <div class="avatar circle"><span>F</span></div>
                <div class="flex-grow-1 min-w-0">
                  <div class="d-flex justify-content-between gap-2">
                    <div class="fw-bold text-truncate">Football Content Awards</div>
                    <div class="text-secondary small flex-shrink-0">32w</div>
                  </div>
                  <div class="text-secondary small text-truncate mt-1">
                    Hey there, hope you’re well! Just a quick …
                  </div>
                </div>
              </a>

              <a class="chat-row" href="#">
                <div class="avatar circle img"></div>
                <div class="flex-grow-1 min-w-0">
                  <div class="d-flex justify-content-between gap-2">
                    <div class="fw-bold text-truncate">MARIO COLLECTIONS</div>
                    <div class="text-secondary small flex-shrink-0">75w</div>
                  </div>
                  <div class="text-secondary small text-truncate mt-1">
                    Where are we delivering to <i class="fa-solid fa-pen-to-square ms-1"></i>
                  </div>
                </div>
              </a>

              <a class="chat-row" href="#">
                <div class="avatar circle img2"></div>
                <div class="flex-grow-1 min-w-0">
                  <div class="d-flex justify-content-between gap-2">
                    <div class="fw-bold text-truncate">Lana Rise ✨</div>
                    <div class="text-secondary small flex-shrink-0">77w</div>
                  </div>
                  <div class="text-secondary small text-truncate mt-1">
                    <span class="fw-semibold">You:</span> hey
                  </div>
                </div>
              </a>
            </div>

          </div>
        </section>

        <!-- CONVERSATION -->
        <!-- Bootstrap breakpoint handles hide/show: hidden on < lg -->
        <main class="col d-none d-lg-flex">
          <div class="convo-scroll d-flex align-items-center justify-content-center position-relative w-100">

            <div class="text-center px-3" style="max-width:520px;">
              <div class="big-mail mx-auto mb-3">
                <i class="fa-regular fa-envelope"></i>
              </div>

              <h1 class="fw-bold display-6 mb-2">Start Conversation</h1>
              <p class="text-secondary mb-3">
                Choose from your existing conversations, or start a new one.
              </p>

              <button class="btn btn-light rounded-pill fw-bold px-4">
                New chat
              </button>
            </div>

            <button class="floating-btn" title="New message">
              <i class="fa-regular fa-envelope"></i>
            </button>
          </div>
        </main>

      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
